name: CI

on:
  push:
    branches: [master]
    paths:
      - bindings/**
      - binding.gyp
      - examples/**
      - src/**
      - test/**
      - grammar.js
  pull_request:
    branches: [master]
    paths:
      - bindings/**
      - binding.gyp
      - examples/**
      - src/**
      - test/**
      - grammar.js

jobs:
  tests:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
    permissions:
      contents: read

    steps:
      - name: Code checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup tree-sitter
        uses: ./.github/actions/tree-sitter-cli

      - name: Run tests
        uses: tree-sitter/parser-test-action@e9b2fecb014a7f8caa1a47316450d4e665132ed9 # v2
        with:
          node-version: '22'
          test-go: true
          test-node: true
          test-python: true
          test-rust: true
          test-swift: true

      - name: Parse examples
        uses: tree-sitter/parse-action@f44ffa94f802024f27e821a72e6f2f3efc5dd521 # v4
        with:
          files: |-
            examples/Caddyfile
            examples/*.caddyfile
