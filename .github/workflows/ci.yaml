name: CI

on:
  push:
    branches: [master]
    # paths:
    #   - bindings/**
    #   - binding.gyp
    #   - examples/**
    #   - src/**
    #   - test/**
    #   - grammar.js
  pull_request:
    branches: [master]
    # paths:
    #   - bindings/**
    #   - binding.gyp
    #   - examples/**
    #   - src/**
    #   - test/**
    #   - grammar.js

jobs:
  tests:
    name: Tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04]
    permissions:
      contents: read

    steps:
      - name: Code checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: npm

      - name: Setup tree-sitter
        uses: ./.github/actions/tree-sitter-cli

      - name: Run tests
        uses: tree-sitter/parser-test-action@e9b2fecb014a7f8caa1a47316450d4e665132ed9 # v2
        with:
          node-version: '22'
          test-go: true
          test-node: true
          test-python: true
          test-rust: true
          test-swift: true

      - name: Parse examples
        uses: tree-sitter/parse-action@f44ffa94f802024f27e821a72e6f2f3efc5dd521 # v4
        with:
          files: |-
            examples/Caddyfile
            examples/*.caddyfile
